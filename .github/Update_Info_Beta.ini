[Latest_Version]
Ver="v3.136.01"
[Change_log]
log="\n- A lot improvements has been made in the latest version, please check online Change log page to learn more.\n\n- 您正在使用老旧版本, 建议立即更新. 最新版中已进行了很多改进, 包含新的超分辨率和补帧(插帧)技术. 请查阅在线更新日志页面以了解更多.\n\n- 您正在使用老舊版本, 建議立即更新. 最新版中已進行了很多改進, 包含新的超分辨率和補幀(插幀)技術. 請查閱在線更新日誌頁面以了解更多."
log_SimplifiedChinese="\n- 新模型： [AnimeVideo-Mini] 模型的 v1.8 更新，改进了去噪和细节重建。\n- 改进了对高 DPI 显示器的支持。\n- 修复了打开本地 HTML 帮助文档时浏览器出现模糊外观的问题。\n- 解决了在某些电脑上本地帮助文档无法正常打开的问题。\n- 修复 bug：放大极小图像时引擎崩溃。\n\n更新日期: 2026年4月2日"
log_TraditionalChinese="\n- 新模型： [AnimeVideo-Mini] 模型的 v1.8 更新，改進了去噪和細節重建。\n- 改進了對高 DPI 顯示器的支援。\n- 修復了開啟本地 HTML 說明文件時瀏覽器出現模糊外觀的問題。\n- 解決了在某些電腦上本地說明文件無法正常開啟的問題。\n- 修復 bug：放大極小圖像時引擎崩潰。\n\n更新日期: 2026年4月2日"
log_English="\n- NEW Model: v1.8 update for [AnimeVideo-Mini] model, with improved denosie and details reconstruction.\n- Improved support for high-DPI displays.\n- Fixed blurry appearance of the browser when opening local HTML help documentation.\n- Resolved issue where local help documentation failed to open properly on some PCs.\n- Fix bug: Engine crash when upscaling extremely small images.\n\nRelease Date: April 2, 2026"
