[Change_log]
log="\n- A lot improvements has been made in the latest version, please check online Change log page to learn more.\n\n- 您正在使用老旧版本, 建议立即更新. 最新版中已进行了很多改进, 包含新的超分辨率和补帧(插帧)技术. 请查阅在线更新日志页面以了解更多.\n\n- 您正在使用老舊版本, 建議立即更新. 最新版中已進行了很多改進, 包含新的超分辨率和補幀(插幀)技術. 請查閱在線更新日誌頁面以了解更多."
log_SimplifiedChinese="\n- 改进了对高DPI显示器的支持和缩放。\n- 修复了打开本地 HTML 帮助文档时浏览器出现模糊的现象。\n- 解决了部分电脑上本地帮助文档无法正常打开的问题。\n\n更新日期: 2026年3月17日"
log_TraditionalChinese="\n- 改進了對高 DPI 顯示器的支援與縮放。\n- 修復了開啟本地 HTML 說明文件時瀏覽器出現模糊的問題。\n- 解決了部分電腦上本地說明文件無法正常開啟的狀況。\n\n更新日期: 2026年3月17日"
log_English="\n- Improved support and scaling for high-DPI high-resolution displays.\n- Fixed blurry appearance of the browser when opening local HTML help documentation.\n- Resolved issue where local help documentation failed to open properly on some PCs.\n\nRelease Date: March 17, 2026"
